# ══════════════════════════════════════════════════════════════════════════════
#  application.properties
#  Purpose : Central configuration for the Spring Boot JWT Auth application.
#  Contains : datasource, JPA, JWT secrets/expiry, mail (SMTP), server port.
# ══════════════════════════════════════════════════════════════════════════════

spring.application.name=html-to-figma-api

# ── Database ──────────────────────────────────────────────────────────────────
spring.datasource.url=jdbc:postgresql://localhost:5432/springboot_db
spring.datasource.username=postgres
spring.datasource.password=amit

# ── JPA / Hibernate ───────────────────────────────────────────────────────────
# ddl-auto=update → auto-creates / alters tables on startup (use "validate" in prod)
spring.jpa.hibernate.ddl-auto=update
spring.jpa.show-sql=true
spring.jpa.properties.hibernate.dialect=org.hibernate.dialect.PostgreSQLDialect
spring.jpa.properties.hibernate.format_sql=true

# ── JWT — Access Token ────────────────────────────────────────────────────────
# Secret must be ≥ 256 bits (32+ chars). Change this in production!
# NOTE: Some setups expect a custom property namespace (e.g. 'app.jwt.*').
# Keep the old key as a comment to avoid "unknown property" diagnostics and
# provide the namespaced property used by the application.
# jwt.secret=YourSuperSecretKeyForJWTTokenGenerationMustBeAtLeast256BitsLong12345
# app.jwt.secret=YourSuperSecretKeyForJWTTokenGenerationMustBeAtLeast256BitsLong12345
jwt.secret=YourSuperSecretKeyForJWTTokenGenerationMustBeAtLeast256BitsLong12345
app.jwt.secret=YourSuperSecretKeyForJWTTokenGenerationMustBeAtLeast256BitsLong12345
# Access token lifetime: 15 minutes (short-lived for security)
jwt.expiration=900000

# ── JWT — Refresh Token ───────────────────────────────────────────────────────
# ADDED: Refresh token is long-lived (7 days). Stored in the DB as a plain UUID.
jwt.refresh-expiration=604800000

# ── Email Verification Token ──────────────────────────────────────────────────
# ADDED: Token expiry for email-verification links (24 hours)
email.verification.expiry-hours=24
# Base URL used to build the verification link sent in the email
# app.base-url=http://192.168.100.34:8080
  app.base-url= http://localhost:8080

# ── Spring Mail (SMTP — Gmail example) ───────────────────────────────────────
# ADDED: Configure your SMTP server here. For Gmail, enable "App Passwords".
spring.mail.host=smtp.gmail.com
spring.mail.port=587
spring.mail.username=amitghimire100@gmail.com
spring.mail.password=fzdb dlbw pdop cfhx
spring.mail.properties.mail.smtp.auth=true
spring.mail.properties.mail.smtp.starttls.enable=true

# ── Server ────────────────────────────────────────────────────────────────────
server.port=8080
server.address=0.0.0.0